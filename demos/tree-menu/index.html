<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tree Menu Demo</title>

  <link rel="stylesheet" type="text/css" href="">
</head>

<body>
  <cord-load-templates>
    menu.thtml
  </cord-load-templates>
  
  <cord-container cord-id="test">
    <span>
      <button on:click="$global.menu.$value++" a="${#menu:value}">
        Clicked: ${counter}
      </button>
      <button on:click="$self.add()"  a="${$global.menu.value}">
        Clicked: #{menu:value} ${$global.menu.value}
      </button>
    </span>
    <cord-script>
      $self.add = () => {
        $self.$counter++;
        $global.menu.$value++;
      }
    </cord-script>
  </cord-container>
  
  <cord-container cord-id="menu" cord-tpl-ref="tpl-menu"></cord-container>

  <script src="cord.js"></script>
  <script src="index.js"></script>
  <script src="lexer.js"></script>
</body>

</html>
